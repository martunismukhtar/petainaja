name: petainaja

on:
  push:
    branches:
      - main   # bisa diganti sesuai nama branch deploy kamu

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat <<EOF > ~/.ssh/config
          Host server
            HostName ${{ secrets.SERVER_IP }}
            User ${{ secrets.SERVER_USER }}
            Port ${{ secrets.SERVER_PORT }}
            StrictHostKeyChecking no
          EOF

      - name: Deploy to Server
        run: |
          ssh server "cd /var/www/html/petainaja && git fetch origin main && git reset --hard origin/main && echo '✅ Deployment completed!'"
